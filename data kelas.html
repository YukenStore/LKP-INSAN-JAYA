<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Bricolage+Grotesque:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-bricolage {
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        .details-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .details-content.open {
            max-height: 300px;
            opacity: 1;
            padding-top: 1rem;
            border-top: 1px dashed #e2e8f0;
            margin-top: 1rem;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-screen">
    <aside class="hidden md:flex flex-col w-64 h-full bg-white border-r border-slate-200 z-20 flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <div class="flex items-center gap-1">
                <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center overflow-hidden">
                    <img src="Logo Insan Jaya.jpeg" alt="Logo Insan Jaya" class="w-full h-full object-contain" />
                </div>
                <span class="font-bricolage font-bold text-lg text-slate-900 tracking-tight">LKP</span>
                <span class="font-bricolage font-bold text-lg text-violet-600">INSAN JAYA</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar py-4 px-3 space-y-1">
            <a href="pendaftaran.html"
                class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                Pendaftaran Baru
            </a>
            <a href="absensi siswa.html"
                class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                Absensi Siswa
            </a>
            <a href="data kelas.html"
                class="flex items-center gap-3 px-3 py-2.5 bg-violet-50 text-violet-700 rounded-xl font-semibold text-sm transition-colors">
                <svg class=" w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                Data Siswa Aktif
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- header mobile -->
        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4">
            <span class="font-bold">Data Kelas</span>
            <a href="pendaftaran.html" class="text-violet-600 font-bold text-sm">+ Input</a>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6">

            <div class="max-w-5xl mx-auto space-y-6">

                <!-- Judul -->
                <h2 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900">
                    Data Siswa Aktif
                </h2>

                <!-- Statistik -->
                <div class="flex gap-4">
                    <div class="bg-white p-3 rounded-xl border border-slate-200 flex-1 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Total Siswa</p>
                        <p id="totalSiswa" class="text-xl font-bold">0</p>
                    </div>
                    <div class="bg-white p-3 rounded-xl border border-slate-200 flex-1 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Daftar Hari Ini</p>
                        <p id="totalHariIni" class="text-xl font-bold text-violet-600">0</p>
                    </div>
                </div>

                <div class="grid md:grid-cols-5 gap-3 mb-4">
                    <input id="searchNama" placeholder="Cari nama..." class="px-3 py-2 border rounded-xl text-sm">

                    <select id="filterProgram" class="px-3 py-2 border rounded-xl text-sm">
                        <option value="">Semua Program</option>
                    </select>

                    <select id="filterKelas" class="px-3 py-2 border rounded-xl text-sm">
                        <option value="">Semua Kelas</option>
                    </select>

                    <input id="filterGuru" placeholder="Cari guru..." class="px-3 py-2 border rounded-xl text-sm">

                    <input id="filterJadwal" placeholder="Cari jadwal..." class="px-3 py-2 border rounded-xl text-sm">
                </div>

                <!-- Table -->
                <div class="hidden md:block bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                                <th class="p-3">Nama Siswa</th>
                                <th class="p-3">Program</th>
                                <th class="p-3">Kelas</th>
                                <th class="p-3">Guru</th>
                                <th class="p-3">Jadwal</th> <!-- TAMBAH -->
                                <th class="p-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="desktopTbody" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>

            </div>
        </div>

        <div id="mobileList" class="md:hidden space-y-4"></div>

    </main>

    <script>
        let allData = [];
        const API = 'https://absensi-api.yumenoboken.workers.dev/api';

        async function loadData() {
            const res = await fetch(`${API}/data`);
            const data = await res.json();

            allData = data;

            document.getElementById('totalSiswa').innerText = data.length;

            const today = new Date().toLocaleDateString('en-CA');
            document.getElementById('totalHariIni').innerText =
                data.filter(s => s.waktu_input.includes(today)).length;

            initFilterOptions(data); // 🔥 TAMBAH INI
            applyFilter();
        }

        function renderDesktop(data) {
            const tbody = document.getElementById('desktopTbody');
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-5 font-bold">${s.nama_siswa}</td>
                    <td class="p-5"><span class="bg-slate-100 px-2 py-1 rounded text-xs uppercase font-bold">${s.program}</span></td>
                    <td class="p-5 text-violet-700 font-bold">${s.kelas}</td>
                    <td class="p-3 text-slate-500">${s.guru}</td>
                    <td class="p-3 text-slate-500">
                        <span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-xs font-bold">
                        ${s.jadwal || '-'}
                        </span>
                    </td>
                    <td class="p-3"><button onclick="hapus(${s.id})" class="text-red-500 font-bold text-xs">Hapus</button></td>
                </tr>
            `).join('');
        }

        function renderMobile(data) {
            const container = document.getElementById('mobileList');
            container.innerHTML = data.map((s, i) => `
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center cursor-pointer" onclick="document.getElementById('det-${i}').classList.toggle('open')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-violet-100 text-violet-700 rounded-full flex items-center justify-center font-bold">${s.nama_siswa[0]}</div>
                            <span class="font-bold text-slate-800">${s.nama_siswa}</span>
                        </div>
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    <div id="det-${i}" class="details-content">
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase">Kelas</p><p class="text-sm font-bold text-violet-600">${s.kelas}</p></div>
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase">Program</p><p class="text-sm font-bold capitalize">${s.program}</p></div>
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase">Guru</p><p class="text-sm font-bold text-slate-600">${s.guru}</p></div>
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase">Jadwal</p><p class="text-sm font-bold text-amber-600">${s.jadwal || '-'}</p></div>
                            <div class="flex items-end"><button onclick="hapus(${s.id})" class="text-red-500 font-bold text-xs border border-red-100 px-3 py-1 rounded-lg">Hapus Data</button></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function applyFilter() {
            const nama = document.getElementById('searchNama')?.value.toLowerCase() || '';
            const program = document.getElementById('filterProgram')?.value || '';
            const kelas = document.getElementById('filterKelas')?.value || '';
            const guru = document.getElementById('filterGuru')?.value.toLowerCase() || '';
            const jadwal = document.getElementById('filterJadwal')?.value.toLowerCase() || '';

            const filtered = allData.filter(s =>
                s.nama_siswa.toLowerCase().includes(nama) &&
                (program === '' || s.program === program) &&
                (kelas === '' || s.kelas === kelas) &&
                s.guru.toLowerCase().includes(guru) &&
                (s.jadwal || '').toLowerCase().includes(jadwal)
            );

            renderDesktop(filtered);
            renderMobile(filtered);
        }

        function initFilterOptions(data) {
            const programSet = [...new Set(data.map(d => d.program))];
            const kelasSet = [...new Set(data.map(d => d.kelas))];

            const progEl = document.getElementById('filterProgram');
            const kelasEl = document.getElementById('filterKelas');

            // reset isi
            progEl.innerHTML = '<option value="">Semua Program</option>';
            kelasEl.innerHTML = '<option value="">Semua Kelas</option>';

            // isi program
            programSet.forEach(p => {
                progEl.innerHTML += `<option value="${p}">${p}</option>`;
            });

            // isi kelas
            kelasSet.forEach(k => {
                kelasEl.innerHTML += `<option value="${k}">${k}</option>`;
            });
        }

        async function hapus(id) {
            if (!confirm("Hapus data?")) return;
            await fetch(`${API}/delete`, { method: 'POST', body: JSON.stringify({ id }) });
            loadData();
        }

        ['searchNama', 'filterProgram', 'filterKelas', 'filterGuru', 'filterJadwal']
            .forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', applyFilter);
                    el.addEventListener('change', applyFilter);
                }
            });

        loadData();
    </script>
</body>

</html>
