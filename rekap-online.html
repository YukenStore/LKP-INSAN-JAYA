<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Pendaftaran Online</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-bricolage { font-family: 'Bricolage Grotesque', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-[100dvh] relative">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-10 flex-shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center overflow-hidden border">
                    <img src="image/Logo Insan Jaya.png" class="w-full h-full object-contain">
                </div>
                <div class="flex items-center gap-1">
                    <span class="font-bricolage font-bold text-base text-slate-900">LKP</span>
                    <span class="font-bricolage font-bold text-base text-violet-600">INSAN JAYA</span>
                </div>
            </div>
            <button id="mobileMenuBtn" class="p-2 text-slate-600 hover:text-violet-600 hover:bg-slate-50 rounded-lg transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div class="max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                    <div>
                        <h1 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Pendaftaran Online</h1>
                        <p class="text-sm text-slate-500 mt-1">Daftar calon siswa yang mengisi formulir secara online.</p>
                    </div>
                    <button onclick="fetchData()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 rounded-xl font-medium text-sm transition-colors shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        Muat Ulang
                    </button>
                </div>

                <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse whitespace-normal md:whitespace-nowrap">
                            <thead>
                                <tr class="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-[10px] md:text-[11px] uppercase tracking-wider font-bold">
                                    <th class="px-3 py-3 md:px-6 md:py-4 hidden md:table-cell">Waktu Daftar</th>
                                    <th class="px-3 py-3 md:px-6 md:py-4">Nama Siswa</th>
                                    <th class="px-3 py-3 md:px-6 md:py-4 hidden md:table-cell">Program</th>
                                    <th class="px-3 py-3 md:px-6 md:py-4 hidden lg:table-cell">No. HP</th>
                                    <th class="px-3 py-3 md:px-6 md:py-4 text-center">Status</th>
                                    <th class="px-3 py-3 md:px-6 md:py-4 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
                                <tr><td colspan="6" class="text-center py-8 text-slate-400">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Detail Pendaftar -->
    <div id="modalDetail" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col transform scale-95 opacity-0 transition-all duration-300" id="modalDetailContent">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h3 class="font-bricolage font-bold text-xl text-slate-800">Detail Pendaftaran</h3>
                <button onclick="closeModalDetail()" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50" id="detailContent">
                <!-- Data will be injected here -->
            </div>

            <div class="p-4 sm:p-6 border-t border-slate-100 bg-white flex flex-col-reverse sm:flex-row justify-end gap-3 sticky bottom-0 w-full">
                <button onclick="closeModalDetail()" class="w-full sm:w-auto px-6 py-2.5 rounded-xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 transition-colors">Tutup</button>
                <div id="actionButtons" class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = CONFIG.API_URL;
        let allData = [];
        let currentDetailId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const userEmail = localStorage.getItem('lkp_user_email');
            
            if (!CONFIG.ADMIN_EMAILS.includes(userEmail)) {
                alert("Akses Ditolak. Halaman ini hanya untuk Admin.");
                window.location.href = 'dashboard.html';
                return;
            }

            fetchData();
        });

        async function fetchData() {
            try {
                // Tambahkan timestamp (t) agar browser tidak menggunakan cache lama
                const res = await fetchWithAuth(`${API_URL}/api/pendaftaran-online?t=${new Date().getTime()}`);
                allData = await res.json();
                renderTable();
                updateBadge(allData.filter(d => d.status === 'Belum Lunas').length);
            } catch (err) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500 font-medium">Gagal memuat data</td></tr>`;
            }
        }

        function updateBadge(count) {
            const badge = document.getElementById('badgeNotifMenu');
            if(count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function formatDate(dateStr) {
            if(!dateStr) return "-";
            const date = new Date(dateStr);
            return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (allData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10"><div class="flex flex-col items-center"><svg class="w-12 h-12 text-slate-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg><span class="text-slate-500 font-medium">Belum ada data pendaftaran</span></div></td></tr>`;
                return;
            }

            tbody.innerHTML = allData.map(d => {
                let statusBadge = '';
                if(d.status === 'Belum Lunas') statusBadge = `<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded-lg text-[10px] md:text-xs font-bold border border-yellow-200 whitespace-nowrap">Belum Lunas</span>`;
                else if(d.status === 'Lunas') statusBadge = `<span class="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-[10px] md:text-xs font-bold border border-green-200 whitespace-nowrap">Lunas</span>`;
                else statusBadge = `<span class="px-2 py-1 bg-slate-100 text-slate-700 rounded-lg text-[10px] md:text-xs font-bold border border-slate-200 whitespace-nowrap">${d.status}</span>`;

                return `
                <tr class="hover:bg-slate-50/50 transition-colors group border-b border-slate-50 last:border-none">
                    <td class="px-3 py-3 md:px-6 md:py-4 text-slate-500 hidden md:table-cell">${formatDate(d.waktu_daftar)}</td>
                    <td class="px-3 py-3 md:px-6 md:py-4">
                        <div class="font-bold text-slate-800 text-sm">${d.nama_lengkap}</div>
                        <div class="text-[10px] text-slate-500 md:hidden mt-1 font-medium leading-tight">${formatDate(d.waktu_daftar)} &bull; ${d.program}</div>
                    </td>
                    <td class="px-3 py-3 md:px-6 md:py-4 text-slate-600 hidden md:table-cell">${d.program}</td>
                    <td class="px-3 py-3 md:px-6 md:py-4 text-slate-600 hidden lg:table-cell">${d.no_handphone || '-'}</td>
                    <td class="px-3 py-3 md:px-6 md:py-4 text-center">${statusBadge}</td>
                    <td class="px-3 py-3 md:px-6 md:py-4 text-right">
                        <button onclick="openDetail(${d.id})" class="px-3 py-1.5 md:px-4 md:py-2 bg-white text-violet-600 border border-violet-200 hover:bg-violet-50 rounded-xl font-bold text-xs transition-colors shadow-sm whitespace-nowrap active:scale-95">Detail</button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function renderRow(label, value) {
            return `
            <div class="border-b border-slate-100 py-3 flex flex-col md:flex-row md:items-start gap-1 md:gap-4">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider md:w-1/3 flex-shrink-0">${label}</span>
                <span class="text-sm font-medium text-slate-800 md:w-2/3">${value || '-'}</span>
            </div>`;
        }

        function openDetail(id) {
            const d = allData.find(x => x.id === id);
            if(!d) return;
            currentDetailId = id;

            const html = `
                <div class="space-y-6">
                    <div>
                        <h4 class="font-bricolage font-bold text-violet-700 mb-2 border-b-2 border-violet-100 inline-block">Data Pribadi</h4>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mt-2">
                            ${renderRow('Nama Lengkap', d.nama_lengkap)}
                            ${renderRow('Jenis Kelamin', d.jenis_kelamin)}
                            ${renderRow('Agama', d.agama)}
                            ${renderRow('Tempat, Tgl Lahir', `${d.tempat_lahir || ''}, ${d.tanggal_lahir || ''}`)}
                            ${renderRow('NISN', d.nisn)}
                            ${renderRow('NIK', d.nik)}
                            ${renderRow('Alamat', d.alamat)}
                            ${renderRow('Penerima KPS', d.penerima_kps === 'YA' ? `Ya (No: ${d.no_kps})` : 'Tidak')}
                        </div>
                    </div>

                    <div>
                        <h4 class="font-bricolage font-bold text-blue-700 mb-2 border-b-2 border-blue-100 inline-block">Data Orang Tua / Wali</h4>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mt-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <p class="text-sm font-bold text-slate-600 mb-2">Data Ibu</p>
                                ${renderRow('Nama', d.nama_ibu)}
                                ${renderRow('Tahun Lahir', d.tahun_lahir_ibu)}
                                ${renderRow('Pekerjaan', d.pekerjaan_ibu)}
                                ${renderRow('Penghasilan', d.penghasilan_ibu)}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-600 mb-2">Data Ayah</p>
                                ${renderRow('Nama', d.nama_ayah)}
                                ${renderRow('Tahun Lahir', d.tahun_lahir_ayah)}
                                ${renderRow('Pekerjaan', d.pekerjaan_ayah)}
                                ${renderRow('Penghasilan', d.penghasilan_ayah)}
                            </div>
                            ${d.nama_wali ? `
                            <div class="md:col-span-2 pt-4 border-t border-slate-100">
                                <p class="text-sm font-bold text-slate-600 mb-2">Data Wali</p>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                    ${renderRow('Nama', d.nama_wali)}
                                    ${renderRow('Tahun Lahir', d.tahun_lahir_wali)}
                                    ${renderRow('Pekerjaan', d.pekerjaan_wali)}
                                    ${renderRow('Penghasilan', d.penghasilan_wali)}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <div>
                        <h4 class="font-bricolage font-bold text-green-700 mb-2 border-b-2 border-green-100 inline-block">Program & Kontak</h4>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mt-2">
                            ${renderRow('Program', d.program)}
                            ${renderRow('Kelas', d.kelas)}
                            ${renderRow('Waktu Belajar', d.waktu_belajar)}
                            ${renderRow('No. HP / WA', d.no_handphone)}
                        </div>
                    </div>

                    <div>
                        <h4 class="font-bricolage font-bold text-amber-700 mb-2 border-b-2 border-amber-100 inline-block">Berkas</h4>
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mt-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${d.foto_siswa ? 
                            `<a href="${CONFIG.API_URL}/uploads/${d.foto_siswa}" target="_blank" class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors group">
                                <div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center flex-shrink-0 text-amber-600 group-hover:bg-amber-100 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold text-slate-700 truncate">Foto 3x4</p>
                                    <p class="text-[10px] text-amber-600 font-medium mt-0.5 flex items-center gap-1">Lihat Berkas <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></p>
                                </div>
                            </a>` : 
                            `<div class="flex items-center gap-3 p-3 rounded-xl border border-dashed border-slate-200 bg-slate-50/50">
                                <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center flex-shrink-0 text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold text-slate-500 truncate">Foto 3x4</p>
                                    <p class="text-[10px] text-slate-400 mt-0.5">Tidak diupload</p>
                                </div>
                            </div>`}

                            ${d.foto_kk ? 
                            `<a href="${CONFIG.API_URL}/uploads/${d.foto_kk}" target="_blank" class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors group">
                                <div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center flex-shrink-0 text-amber-600 group-hover:bg-amber-100 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold text-slate-700 truncate">Kartu Keluarga</p>
                                    <p class="text-[10px] text-amber-600 font-medium mt-0.5 flex items-center gap-1">Lihat Berkas <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></p>
                                </div>
                            </a>` : 
                            `<div class="flex items-center gap-3 p-3 rounded-xl border border-dashed border-slate-200 bg-slate-50/50">
                                <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center flex-shrink-0 text-slate-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold text-slate-500 truncate">Kartu Keluarga</p>
                                    <p class="text-[10px] text-slate-400 mt-0.5">Tidak diupload</p>
                                </div>
                            </div>`}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailContent').innerHTML = html;
            
            const actions = document.getElementById('actionButtons');
            let actionHtml = '';
            
            if(d.status === 'Belum Lunas') {
                actionHtml += `
                    <button onclick="updateStatus(${d.id}, 'Lunas')" class="w-full sm:w-auto px-6 py-2.5 rounded-xl bg-green-600 text-white font-bold hover:bg-green-700 shadow-lg shadow-green-200 transition-colors">Tandai Lunas</button>
                `;
            } else if(d.status === 'Lunas') {
                actionHtml += `
                    <button onclick="updateStatus(${d.id}, 'Belum Lunas')" class="w-full sm:w-auto px-6 py-2.5 rounded-xl bg-yellow-100 text-yellow-700 font-bold hover:bg-yellow-200 transition-colors">Batalkan Lunas</button>
                `;
            }
            
            actionHtml += `
                <button onclick="deletePendaftar(${d.id})" class="w-full sm:w-auto px-6 py-2.5 rounded-xl bg-red-50 text-red-600 font-bold hover:bg-red-100 transition-colors">Hapus Pendaftar</button>
            `;
            
            actions.innerHTML = actionHtml;

            const modal = document.getElementById('modalDetail');
            const content = document.getElementById('modalDetailContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModalDetail() {
            const modal = document.getElementById('modalDetail');
            const content = document.getElementById('modalDetailContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function updateStatus(id, status) {
            if(!confirm(`Apakah Anda yakin ingin mengubah status pendaftaran ini menjadi ${status}?`)) return;
            
            try {
                const res = await fetchWithAuth(`${API_URL}/api/pendaftaran-online/status`, {
                    method: 'POST',
                    body: JSON.stringify({ id, status })
                });
                if(res.ok) {
                    closeModalDetail();
                    fetchData();
                    if(status === 'Lunas') {
                        alert("Pendaftaran berhasil ditandai sebagai Lunas! Silakan daftarkan anak ini secara resmi ke kelas melalui menu Pendaftaran Baru.");
                    }
                }
            } catch(e) {
                alert("Gagal mengupdate status.");
            }
        }

        async function deletePendaftar(id) {
            if(!confirm("Apakah Anda yakin ingin menghapus data pendaftar ini? Tindakan ini tidak dapat dibatalkan.")) return;
            
            try {
                const res = await fetchWithAuth(`${API_URL}/api/pendaftaran-online/delete`, {
                    method: 'POST',
                    body: JSON.stringify({ id })
                });
                if(res.ok) {
                    closeModalDetail();
                    fetchData();
                    alert("Data pendaftar berhasil dihapus.");
                } else {
                    alert("Gagal menghapus data.");
                }
            } catch(e) {
                alert("Terjadi kesalahan saat menghapus data.");
            }
        }

        // PWA installer is handled globally by common.js
    </script>
</body>
</html>
