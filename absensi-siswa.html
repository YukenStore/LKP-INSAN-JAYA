<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Siswa LKP Insan Jaya</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="js/config.js?v=5.0"></script>
    <script src="js/common.js?v=5.0"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then((reg) => {
                    reg.update();
                    console.log('Service Worker: Siap dan Selalu Update!');
                })
                .catch((err) => console.log('Service Worker Failed', err));
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Animasi Panah Kanan-Kiri untuk Hint Mobile */
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        .animate-bounce-x { animation: bounce-x 1.5s infinite ease-in-out; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-bricolage { font-family: 'Bricolage Grotesque', sans-serif; }

        /* Custom scrollbar tipis */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Custom Animasi Background Blobs */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-[100dvh] relative">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col h-full bg-slate-50/50 relative overflow-hidden">
        <div class="hidden md:block absolute top-0 right-0 w-96 h-96 bg-violet-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob pointer-events-none z-0"></div>
        <div class="hidden md:block absolute -bottom-8 left-10 w-72 h-72 bg-fuchsia-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob animation-delay-2000 pointer-events-none z-0"></div>

        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-50 flex-shrink-0 relative">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center overflow-hidden border">
                    <img src="image/Logo Insan Jaya.png" class="w-full h-full object-contain">
                </div>
                <div class="flex items-center gap-1">
                    <span class="font-bricolage font-bold text-base text-slate-900">LKP</span>
                    <span class="font-bricolage font-bold text-base text-violet-600">INSAN JAYA</span>
                </div>
            </div>
            <button id="mobileMenuBtn" class="p-2 text-slate-600 hover:text-violet-600 hover:bg-slate-50 rounded-lg transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 pb-8 relative z-10 custom-scrollbar">
            <div class="max-w-6xl mx-auto">
                <div class="mb-6 md:mb-8 pt-2">
                    <h1 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Absensi Siswa</h1>
                    <p class="text-sm text-slate-500 mt-1 max-w-lg">Kelola kehadiran kelas secara real-time. Perubahan status akan tersimpan otomatis saat Anda mengubahnya.</p>
                </div>

                <!-- Cascading Dropdowns: Program, Guru, Siswa -->
                <div class="bg-white/90 backdrop-blur-sm p-5 md:p-6 rounded-2xl border border-slate-200/60 shadow-xl shadow-violet-100/20 mb-6 grid grid-cols-1 md:grid-cols-3 gap-4 border-t-4 border-t-violet-500 transition-all">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Program</label>
                        <select id="inpProgram" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-white outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10 transition-all cursor-pointer appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]" onchange="onProgramChange()">
                            <option value="">Memuat Program...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Nama Instruktur</label>
                        <select id="inpGuru" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-white outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10 transition-all cursor-pointer appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] disabled:opacity-50 disabled:cursor-not-allowed" disabled onchange="onGuruChange()">
                            <option value="">Pilih Instruktur...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Nama Siswa</label>
                        <select id="inpSiswa" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-white outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10 transition-all cursor-pointer appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] disabled:opacity-50 disabled:cursor-not-allowed" disabled onchange="onSiswaChange()">
                            <option value="">Pilih Siswa...</option>
                        </select>
                    </div>
                </div>

                <!-- Format Absen & Status SPP -->
                <div class="bg-white/90 backdrop-blur-sm p-5 md:p-6 rounded-2xl border border-slate-200/60 shadow-xl shadow-violet-100/20 mb-8 flex flex-wrap gap-4 transition-all hidden" id="settingAbsensiContainer">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Format Absen</label>
                        <select id="inpFormatAbsen" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-white outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10 transition-all cursor-pointer appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]" onchange="handleFormatAbsenChange(this)">
                            <option value="12">12 Pertemuan</option>
                            <option value="8">8 Pertemuan</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[200px] hidden" id="sppContainer">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 tracking-wider">Status SPP</label>
                        <select id="inpStatusSPP" onchange="applySPPColor(this)" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 bg-slate-50 hover:bg-white outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-500/10 transition-all cursor-pointer appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]">
                            <option value="Belum Lunas" style="background-color: #fee2e2; color: #991b1b;">Belum Lunas</option>
                            <option value="Lunas" style="background-color: #dcfce7; color: #166534;">Lunas</option>
                        </select>
                    </div>
                </div>

                <!-- Tabel Absensi Vertikal -->
                <div id="tabelAbsensiContainer" class="hidden bg-white rounded-2xl border border-slate-200/80 shadow-xl shadow-slate-200/40 overflow-hidden relative mb-8">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b border-slate-200">
                                <tr>
                                    <th class="w-12 md:w-24 p-2 md:p-4 text-[10px] md:text-xs font-bold text-violet-800 uppercase bg-slate-100 border-r border-slate-200 text-center">P-Ke</th>
                                    <th class="p-2 md:p-4 text-[10px] md:text-xs font-bold text-violet-800 uppercase bg-slate-100 border-r border-slate-200 text-center">Tanggal</th>
                                    <th class="p-2 md:p-4 text-[10px] md:text-xs font-bold text-violet-800 uppercase bg-slate-100 text-center">Kehadiran</th>
                                </tr>
                            </thead>
                            <tbody id="bodyAbsensiVertikal" class="text-sm divide-y divide-slate-100 bg-white">
                                <!-- Generated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex-wrap justify-end gap-3 hidden" id="containerSimpan">
                    <button id="btnResetAbsensi" onclick="resetAbsensi()" class="hidden w-full sm:w-auto px-6 py-3.5 rounded-xl font-bold bg-red-50 text-red-600 hover:bg-red-100 transition-all text-sm border border-red-100 active:translate-y-1">
                        Reset Absensi
                    </button>
                    <button id="btnSimpanPerubahan" onclick="simpanAbsensi()" class="group w-full sm:w-auto flex items-center justify-center gap-2 bg-violet-600 hover:bg-violet-700 text-white px-8 py-3.5 rounded-xl font-bold shadow-[0_8px_20px_-6px_rgba(124,58,237,0.5)] transition-all duration-200 text-sm active:translate-y-1">
                        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
                        </svg>
                        Simpan Absensi
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ================= FUNGSI CEK AKSES (DIBEDAKAN ANTARA SUPER ADMIN & GURU) =================
        // ================= LOGIKA ABSENSI BARU (PER SISWA, LOCAL STORAGE) =================
        const API_URL = CONFIG.API_URL;
        let allData = [];
        let groupedData = {};

        document.addEventListener("DOMContentLoaded", () => {
            loadDataAbsensi();
            
            // Check SPP and Reset Button access
            if (isSuperAdmin()) {
                document.getElementById('sppContainer').classList.remove('hidden');
                document.getElementById('btnResetAbsensi').classList.remove('hidden');
                document.getElementById('btnResetAbsensi').style.display = 'block'; // force display block for flex container child
            } else {
                document.getElementById('sppContainer').classList.add('hidden');
                document.getElementById('btnResetAbsensi').classList.add('hidden');
                document.getElementById('btnResetAbsensi').style.display = 'none';
            }
        });

        async function loadDataAbsensi() {
            try {
                document.getElementById('inpProgram').innerHTML = '<option value="">⏳ Memuat program...</option>';
                const res = await fetchWithAuth(`${API_URL}/api/data`);
                const data = await res.json();
                
                // Urutkan siswa secara alfabetis sebelum dikelompokkan
                data.sort((a, b) => (a.nama_siswa || '').localeCompare(b.nama_siswa || ''));
                allData = data;

                // Group by program -> guru -> list siswa
                groupedData = {}; // reset grouped data
                data.forEach(item => {
                    const prog = item.program ? item.program.toLowerCase() : 'lainnya';
                    if (!groupedData[prog]) groupedData[prog] = {};
                    
                    const guru = item.guru || 'Tanpa Instruktur';
                    if (!groupedData[prog][guru]) groupedData[prog][guru] = [];
                    
                    groupedData[prog][guru].push(item);
                });

                const inpProgram = document.getElementById('inpProgram');
                inpProgram.innerHTML = '<option value="">Pilih Program...</option>';
                Object.keys(groupedData).sort().forEach(prog => {
                    const progName = prog.replace(/\b\w/g, c => c.toUpperCase());
                    inpProgram.innerHTML += `<option value="${prog}">${progName}</option>`;
                });
            } catch (error) {
                console.error("Gagal load data untuk absensi:", error);
                document.getElementById('inpProgram').innerHTML = '<option value="">⛔ Gagal memuat program</option>';
            }
        }

        function onProgramChange() {
            const prog = document.getElementById('inpProgram').value;
            const inpGuru = document.getElementById('inpGuru');
            const inpSiswa = document.getElementById('inpSiswa');
            
            inpGuru.innerHTML = '<option value="">Pilih Instruktur...</option>';
            inpSiswa.innerHTML = '<option value="">Pilih Siswa...</option>';
            inpGuru.disabled = true;
            inpSiswa.disabled = true;
            hideAbsensiUI();

            if (prog && groupedData[prog]) {
                Object.keys(groupedData[prog]).sort().forEach(guru => {
                    inpGuru.innerHTML += `<option value="${guru}">${guru}</option>`;
                });
                inpGuru.disabled = false;
            }
        }

        function onGuruChange() {
            const prog = document.getElementById('inpProgram').value;
            const guru = document.getElementById('inpGuru').value;
            const inpSiswa = document.getElementById('inpSiswa');
            
            inpSiswa.innerHTML = '<option value="">Pilih Siswa...</option>';
            inpSiswa.disabled = true;
            hideAbsensiUI();

            if (prog && guru && groupedData[prog][guru]) {
                groupedData[prog][guru].forEach(siswa => {
                    const siswaName = siswa.nama_siswa ? siswa.nama_siswa.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()) : '';
                    inpSiswa.innerHTML += `<option value="${siswa.id}">${siswaName}</option>`;
                });
                inpSiswa.disabled = false;
            }
        }

        let currentSiswaSPP = 'Belum Lunas';

        function onSiswaChange() {
            const siswaId = document.getElementById('inpSiswa').value;
            if (siswaId) {
                showAbsensiUI();
                loadSiswaData(siswaId);
            } else {
                hideAbsensiUI();
            }
        }

        function hideAbsensiUI() {
            document.getElementById('settingAbsensiContainer').classList.add('hidden');
            document.getElementById('tabelAbsensiContainer').classList.add('hidden');
            document.getElementById('containerSimpan').classList.add('hidden');
            document.getElementById('containerSimpan').classList.remove('flex');
        }

        function showAbsensiUI() {
            document.getElementById('settingAbsensiContainer').classList.remove('hidden');
            document.getElementById('tabelAbsensiContainer').classList.remove('hidden');
            document.getElementById('containerSimpan').classList.remove('hidden');
            document.getElementById('containerSimpan').classList.add('flex');
        }

        async function loadSiswaData(siswaId) {
            const tbody = document.getElementById('bodyAbsensiVertikal');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-slate-400">Mengambil data absensi dari server...</td></tr>';
            
            try {
                const res = await fetchWithAuth(`${API_URL}/api/get-absensi-siswa?siswa_id=${siswaId}`);
                const data = await res.json();
                
                const formatSelect = document.getElementById('inpFormatAbsen');
                formatSelect.value = data.format_absen || '12';
                formatSelect.dataset.oldValue = data.format_absen || '12';
                
                currentSiswaSPP = data.status_spp || 'Belum Lunas';
                
                if (isSuperAdmin()) {
                    const sppSelect = document.getElementById('inpStatusSPP');
                    sppSelect.value = currentSiswaSPP;
                    applySPPColor(sppSelect);
                }
                
                let pertemuanObj = {};
                if (data.pertemuan && data.pertemuan.length > 0) {
                    data.pertemuan.forEach(p => {
                        pertemuanObj[p.pertemuan_ke] = { tanggal: p.tanggal, status: p.status };
                    });
                }
                
                // Hapus data lokal jika ada, agar bersih
                localStorage.removeItem(`lkp_absensi_siswa_${siswaId}`);
                
                renderTabelAbsensi(pertemuanObj);
            } catch (error) {
                console.error("Gagal load absensi:", error);
                alert("Gagal mengambil data absensi dari server.");
                renderTabelAbsensi({});
            }
        }

        function handleFormatAbsenChange(el) {
            const newValue = el.value;
            const oldValue = el.dataset.oldValue || '12';
            
            if (oldValue === '12' && newValue === '8') {
                if (!confirm("Peringatan: Mengubah ke format 8 pertemuan akan menyembunyikan dan menghapus data pertemuan 9-12 saat disimpan. Lanjutkan?")) {
                    el.value = oldValue; // revert change
                    return;
                }
            }
            el.dataset.oldValue = newValue; // save new value
            renderTabelAbsensi();
        }

        function applySPPColor(el) {
            const val = el.value;
            if (val === "Lunas") {
                el.style.backgroundColor = '#dcfce7'; // green-100
                el.style.color = '#166534'; // green-800
                el.style.borderColor = '#bbf7d0'; // green-200
            } else {
                el.style.backgroundColor = '#fee2e2'; // red-100
                el.style.color = '#991b1b'; // red-800
                el.style.borderColor = '#fecaca'; // red-200
            }
        }

        function applyStatusColor(el) {
            const status = el.value.toLowerCase();
            const styles = {
                'hadir': { bg: '#dcfce7', text: '#166534', border: '#bbf7d0' },
                'izin': { bg: '#fef3c7', text: '#92400e', border: '#fde68a' },
                'alfa': { bg: '#fee2e2', text: '#991b1b', border: '#fecaca' },
                'default': { bg: '#f8fafc', text: '#94a3b8', border: '#e2e8f0' }
            };
            const style = styles[status] || styles['default'];
            el.style.backgroundColor = style.bg;
            el.style.color = style.text;
            el.style.borderColor = style.border;
        }

        function checkTanggalEmpty(el) {
            if (!el.value) {
                // If empty, make text transparent so mm/dd/yyyy isn't visible, without red background
                el.style.color = 'transparent';
                el.style.borderColor = '#e2e8f0'; // slate-200
                el.style.backgroundColor = '#ffffff'; // white
                el.style.fontWeight = 'normal';
            } else {
                el.style.color = '#334155'; // slate-700
                el.style.borderColor = '#e2e8f0'; // slate-200
                el.style.backgroundColor = '#ffffff'; // white
                el.style.fontWeight = 'bold';
            }
        }

        function renderTabelAbsensi(existingPertemuanData = null) {
            const formatAbsen = parseInt(document.getElementById('inpFormatAbsen').value);
            // Kalau dipanggil via onchange Format Absen, kita baca form state yg ada
            const isReadingForm = existingPertemuanData === null;
            let dataPertemuanToUse = existingPertemuanData || {};
            
            if (isReadingForm) {
                // Ambil state dari input tanggal & select status saat ini sebelum merender ulang
                for(let i=1; i<=12; i++){
                    const inpTgl = document.getElementById(`tanggal_p${i}`);
                    const inpStatus = document.getElementById(`status_p${i}`);
                    if(inpTgl && inpStatus) {
                        dataPertemuanToUse[i] = { tanggal: inpTgl.value, status: inpStatus.value };
                    }
                }
            }

            const tbody = document.getElementById('bodyAbsensiVertikal');
            tbody.innerHTML = '';

            const disabledAttr = isGuruOrAdmin() ? '' : 'disabled';
            const selectCursor = isGuruOrAdmin() ? 'cursor-pointer' : 'cursor-not-allowed';

            for (let i = 1; i <= formatAbsen; i++) {
                const tglValue = dataPertemuanToUse[i]?.tanggal || '';
                const statusValue = dataPertemuanToUse[i]?.status || '';

                const bgRow = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                
                const tr = document.createElement('tr');
                tr.className = `${bgRow} hover:bg-violet-100/50 transition-colors`;
                tr.innerHTML = `
                    <td class="p-1.5 md:p-4 text-center font-bold text-violet-700 text-[11px] md:text-sm border-r border-slate-100">
                        <span class="bg-violet-100 px-1.5 py-1 md:px-2 md:py-1 rounded-lg">P${i}</span>
                    </td>
                    <td class="p-1.5 md:p-4 border-r border-slate-100">
                        <div class="flex justify-center">
                            <input type="date" id="tanggal_p${i}" value="${tglValue}" ${disabledAttr} 
                                onchange="checkTanggalEmpty(this)"
                                onfocus="this.style.color='#334155'"
                                onblur="checkTanggalEmpty(this)"
                                class="border border-slate-200 rounded-xl px-1 md:px-3 py-1.5 md:py-2 text-[11px] md:text-sm outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 ${selectCursor} transition-all w-full min-w-[90px] max-w-[140px]">
                        </div>
                    </td>
                    <td class="p-1.5 md:p-4">
                        <div class="flex justify-center">
                            <select id="status_p${i}" ${disabledAttr} onchange="applyStatusColor(this)" 
                                class="border border-slate-200 rounded-xl px-1 md:px-3 py-1.5 md:py-2 text-[11px] md:text-sm font-bold uppercase outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20 bg-white ${selectCursor} transition-all w-full min-w-[70px] max-w-[130px] text-center" style="background-color: #f8fafc; color: #94a3b8; border-color:#e2e8f0;">
                                <option value="" class="bg-white text-gray-500">-</option>
                                <option value="Hadir" class="bg-white text-green-700">Hadir</option>
                                <option value="Izin" class="bg-white text-amber-700">Izin</option>
                                <option value="Alfa" class="bg-white text-red-700">Alfa</option>
                            </select>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);

                // Apply initial colors and checks
                const selectEl = document.getElementById(`status_p${i}`);
                if (statusValue) selectEl.value = statusValue;
                applyStatusColor(selectEl);

                const dateEl = document.getElementById(`tanggal_p${i}`);
                checkTanggalEmpty(dateEl);
            }
        }

        async function simpanAbsensi() {
            const siswaId = document.getElementById('inpSiswa').value;
            if (!siswaId) return;

            const formatAbsen = document.getElementById('inpFormatAbsen').value;
            let statusSPP = currentSiswaSPP;
            if (isSuperAdmin()) {
                statusSPP = document.getElementById('inpStatusSPP').value;
            }

            let pertemuanData = [];
            for (let i = 1; i <= formatAbsen; i++) {
                const tgl = document.getElementById(`tanggal_p${i}`)?.value || '';
                const sts = document.getElementById(`status_p${i}`)?.value || '';
                if (tgl || sts) {
                    pertemuanData.push({ ke: i, tanggal: tgl, status: sts });
                }
            }

            const payload = {
                siswa_id: siswaId,
                format_absen: parseInt(formatAbsen),
                status_spp: statusSPP,
                pertemuan: pertemuanData
            };

            const btnSimpan = document.getElementById('btnSimpanPerubahan');
            const originalText = btnSimpan.innerHTML;
            btnSimpan.disabled = true;
            btnSimpan.innerHTML = `<svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Menyimpan...`;

            try {
                const res = await fetchWithAuth(`${API_URL}/api/save-absensi-siswa`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) throw new Error("Gagal menyimpan ke server");
                
                btnSimpan.innerHTML = `<svg class="w-5 h-5 mr-2 text-green-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Berhasil Disimpan!`;
                btnSimpan.classList.remove('bg-violet-600', 'hover:bg-violet-700');
                btnSimpan.classList.add('bg-green-600', 'hover:bg-green-700');

                setTimeout(() => {
                    btnSimpan.innerHTML = originalText;
                    btnSimpan.classList.add('bg-violet-600', 'hover:bg-violet-700');
                    btnSimpan.classList.remove('bg-green-600', 'hover:bg-green-700');
                    btnSimpan.disabled = false;
                }, 3000);
                
            } catch (error) {
                console.error("Gagal simpan:", error);
                alert("Gagal menyimpan data absensi ke server.");
                btnSimpan.disabled = false;
                btnSimpan.innerHTML = originalText;
            }
        }

        async function resetAbsensi() {
            const siswaId = document.getElementById('inpSiswa').value;
            const inpSiswa = document.getElementById('inpSiswa');
            const namaSiswa = inpSiswa.options[inpSiswa.selectedIndex].text;
            
            if (!siswaId) return;

            if (confirm(`Apakah Anda yakin ingin MENGHAPUS (reset) seluruh data absensi dan SPP untuk siswa ${namaSiswa}?`)) {
                try {
                    // Save empty payload to reset
                    await fetchWithAuth(`${API_URL}/api/save-absensi-siswa`, {
                        method: 'POST',
                        body: JSON.stringify({
                            siswa_id: siswaId,
                            format_absen: 12,
                            status_spp: 'Belum Lunas',
                            pertemuan: []
                        })
                    });
                    
                    loadSiswaData(siswaId); // Reload empty state from server
                    alert('Data absensi berhasil di-reset.');
                } catch(e) {
                    alert('Gagal mereset data absensi.');
                }
            }
        }
        
        // PWA dan refreshAplikasi helper sudah diwarisi dari common.js
    </script>
