<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Baru</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then((reg) => {
                    reg.update();
                    console.log('Service Worker: Siap dan Selalu Update!');
                })
                .catch((err) => console.log('Service Worker Failed', err));
        }
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-bricolage {
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        /* Custom scrollbar tipis untuk sidebar (Opsional) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-[100dvh] relative">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header
            class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-10 flex-shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center overflow-hidden border">
                    <img src="image/Logo Insan Jaya.png" class="w-full h-full object-contain">
                </div>
                <div class="flex items-center gap-1">
                    <span class="font-bricolage font-bold text-base text-slate-900">LKP</span>
                    <span class="font-bricolage font-bold text-base text-violet-600">INSAN JAYA</span>
                </div>
            </div>
            <button id="mobileMenuBtn"
                class="p-2 text-slate-600 hover:text-violet-600 hover:bg-slate-50 rounded-lg transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-32 md:pb-8">
            <div class="max-w-2xl mx-auto">
                <div class="mb-8">
                    <h1 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Pendaftaran
                        Baru</h1>
                    <p class="text-sm text-slate-500 mt-1">Gunakan form ini untuk pendaftaran program les siswa.</p>
                </div>

                <div id="adminFormContainer"
                    class="hidden bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200/60">
                    <form id="formAbsensi" class="space-y-6">
                        <div>
                            <label
                                class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Nama
                                Lengkap Siswa</label>
                            <input type="text" name="nama_siswa" required placeholder="Nama lengkap siswa..."
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-violet-500 outline-none transition-all">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label
                                    class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Program</label>
                                <select id="program" name="program" required
                                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500 appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]">
                                    <option value="" disabled selected>Pilih program...</option>
                                    <option value="bahasa arab">Bahasa Arab</option>
                                    <option value="bahasa inggris">Bahasa Inggris</option>
                                    <option value="bimbel">Bimbel</option>
                                    <option value="calistung">Calistung</option>
                                    <option value="komputer">Komputer</option>
                                    <option value="menggambar & mewarnai">Menggambar & Mewarnai</option>
                                </select>
                            </div>
                            <div>
                                <label
                                    class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Kelas</label>
                                <select id="kelas" name="kelas" required
                                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500 appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]">
                                    <option value="" disabled selected>Pilih program dulu...</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label
                                class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Guru
                                Pengajar</label>
                            <select id="guru" name="guru" required
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500">
                                <option value="" disabled selected>Pilih program dulu...</option>
                            </select>
                        </div>

                        <div id="hariBelajarContainer">
                            <label class="text-[11px] font-bold text-slate-500 uppercase mb-2 block">Hari Belajar (Maks
                                3)</label>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
                                <label><input type="checkbox" name="hari" value="Senin"> Senin</label>
                                <label><input type="checkbox" name="hari" value="Selasa"> Selasa</label>
                                <label><input type="checkbox" name="hari" value="Rabu"> Rabu</label>
                                <label><input type="checkbox" name="hari" value="Kamis"> Kamis</label>
                                <label><input type="checkbox" name="hari" value="Jumat"> Jumat</label>
                                <label><input type="checkbox" name="hari" value="Sabtu"> Sabtu</label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Jam
                                Belajar</label>
                            <select id="jam" name="jam" required
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500">
                                <option value="" disabled selected>Pilih jam...</option>
                                <option value="07.30-09.00">07.30 - 09.00</option>
                                <option value="09.00-10.30">09.00 - 10.30</option>
                                <option value="10.30-12.00">10.30 - 12.00</option>
                                <option value="12.00-13.30">12.00 - 13.30</option>
                                <option value="13.30-15.00">13.30 - 15.00</option>
                                <option value="15.00-16.30">15.00 - 16.30</option>
                                <option value="16.30-18.00">16.30 - 18.00</option>
                                <option value="CUSTOM">Pilih jam sendiri...</option>
                                <option value="CUSTOM_SCHEDULE">Pilih Jadwal Sendiri</option>
                            </select>

                            <div id="customJamContainer" class="hidden mt-4">
                                <label
                                    class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3">Custom
                                    Jam</label>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs text-slate-500 mb-1 block">Jam Masuk</label>
                                        <input type="text" id="jamMasuk" maxlength="5" inputmode="numeric"
                                            placeholder="15:30"
                                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500">
                                    </div>
                                    <div>
                                        <label class="text-xs text-slate-500 mb-1 block">Jam Keluar</label>
                                        <input type="text" id="jamKeluar" maxlength="5" inputmode="numeric"
                                            placeholder="17:00"
                                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500">
                                    </div>
                                </div>
                            </div>
                            <div id="jadwalCustomContainer" class="hidden"></div>
                        </div>

                        <button type="submit" id="btnSubmit"
                            class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-violet-100 active:scale-[0.98] font-bricolage tracking-wide">
                            Simpan Pendaftaran
                        </button>
                        <div id="notif"
                            class="hidden text-center text-xs font-bold text-emerald-600 bg-emerald-50 py-3 rounded-xl border border-emerald-100">
                            ✅ Berhasil Terkirim!
                        </div>
                    </form>
                </div>


            </div>
        </div>
    </main>

    <script>
        // ================= SISTEM KEAMANAN PENDAFTARAN =================
        function cekAksesPendaftaran() {
            const currentUserEmail = localStorage.getItem('lkp_user_email');
            const adminEmails = CONFIG.ADMIN_EMAILS;

            if (!adminEmails.includes(currentUserEmail)) {
                alert("⛔ Akses Ditolak: Halaman ini khusus Admin.");
                window.location.href = 'dashboard.html';
                return;
            }

            const adminForm = document.getElementById('adminFormContainer');
            if (adminForm) adminForm.classList.remove('hidden');
        }

        document.addEventListener("DOMContentLoaded", cekAksesPendaftaran);

        const API_URL = CONFIG.API_URL;

        function formatNama(nama) {
            return nama.toLowerCase().replace(/\s+/g, ' ').trim().split(' ')
                .map(word => word.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('-')).join(' ');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const jadwalContainer = document.getElementById('jadwalCustomContainer');

            jadwalContainer.innerHTML = `
                <div class="mt-4 space-y-3">
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest">Jadwal Per Hari</label>
                    ${["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"].map(hari => `
                        <div class="jadwal-row flex items-center gap-2 sm:gap-3">
                            <input type="checkbox" value="${hari}" class="jadwal-check w-4 h-4 sm:w-5 sm:h-5 flex-shrink-0 rounded border-slate-300 text-violet-600 focus:ring-violet-500">
                            <span class="w-14 sm:w-20 text-xs sm:text-sm font-medium text-slate-700 flex-shrink-0">${hari}</span>
                            <input type="text" placeholder="15:30" maxlength="5" inputmode="numeric" class="jam-masuk jadwal-custom-jam flex-1 min-w-0 px-1 sm:px-3 py-2 border border-slate-200 rounded-lg text-center outline-none font-mono text-xs sm:text-sm">
                            <span class="text-slate-400 flex-shrink-0">-</span>
                            <input type="text" placeholder="17:00" maxlength="5" inputmode="numeric" class="jam-keluar jadwal-custom-jam flex-1 min-w-0 px-1 sm:px-3 py-2 border border-slate-200 rounded-lg text-center outline-none font-mono text-xs sm:text-sm">
                        </div>
                    `).join("")}
                </div>
            `;

            const checkboxes = document.querySelectorAll('input[name="hari"]');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    const checked = document.querySelectorAll('input[name="hari"]:checked');
                    if (checked.length > 3) {
                        cb.checked = false;
                        alert('Maksimal pilih 3 hari!');
                    }
                });
            });

            document.getElementById('program').addEventListener('change', (e) => {
                const prog = e.target.value;
                const kelasSelect = document.getElementById('kelas');
                const guruSelect = document.getElementById('guru');

                kelasSelect.innerHTML = '<option value="" disabled selected>Pilih kelas...</option>';
                if (CONFIG.CLASSES_BY_PROGRAM[prog]) {
                    CONFIG.CLASSES_BY_PROGRAM[prog].forEach(kelas => {
                        kelasSelect.innerHTML += `<option value="${kelas}">${kelas}</option>`;
                    });
                }

                guruSelect.innerHTML = '<option value="" disabled selected>Pilih guru...</option>';
                if (CONFIG.GURU_BY_PROGRAM[prog]) {
                    CONFIG.GURU_BY_PROGRAM[prog].forEach(guru => {
                        guruSelect.innerHTML += `<option value="${guru}">${guru}</option>`;
                    });
                }
            });

            const jamSelect = document.getElementById('jam');
            const customContainer = document.getElementById('customJamContainer');
            const hariBelajarContainer = document.getElementById('hariBelajarContainer');

            jamSelect.addEventListener('change', () => {
                if (jamSelect.value === 'CUSTOM') {
                    customContainer.classList.remove('hidden');
                    jadwalContainer.classList.add('hidden');
                    if (hariBelajarContainer) hariBelajarContainer.classList.remove('hidden');
                } else if (jamSelect.value === 'CUSTOM_SCHEDULE') {
                    customContainer.classList.add('hidden');
                    jadwalContainer.classList.remove('hidden');
                    if (hariBelajarContainer) hariBelajarContainer.classList.add('hidden');
                } else {
                    customContainer.classList.add('hidden');
                    jadwalContainer.classList.add('hidden');
                    if (hariBelajarContainer) hariBelajarContainer.classList.remove('hidden');
                }
            });

            function autoFormatJam(input) {
                input.addEventListener('input', () => {
                    let value = input.value.replace(/\D/g, '').slice(0, 4);
                    if (value.length >= 1 && parseInt(value[0]) > 2) value = '0' + value[0];
                    if (value.length >= 2 && parseInt(value.slice(0, 2)) > 23) value = '23' + value.slice(2);
                    if (value.length >= 3 && parseInt(value[2]) > 5) value = value.slice(0, 2) + '0' + value.slice(2);
                    if (value.length >= 3) value = value.slice(0, 2) + ':' + value.slice(2);
                    input.value = value;
                });
            }

            autoFormatJam(document.getElementById('jamMasuk'));
            autoFormatJam(document.getElementById('jamKeluar'));
            document.querySelectorAll('.jadwal-custom-jam').forEach(autoFormatJam);

            document.querySelector('[name="nama_siswa"]').addEventListener('blur', (e) => {
                e.target.value = formatNama(e.target.value);
            });

            document.getElementById('formAbsensi').addEventListener('submit', async (e) => {
                e.preventDefault();

                const btn = document.getElementById('btnSubmit');
                let jadwalFinal = "";
                const data = Object.fromEntries(new FormData(e.target).entries());
                data.nama_siswa = formatNama(data.nama_siswa);

                if (data.jam !== 'CUSTOM_SCHEDULE') {
                    const hariChecked = Array.from(document.querySelectorAll('input[name="hari"]:checked')).map(el => el.value);
                    if (hariChecked.length === 0) {
                        alert('Pilih minimal 1 hari!');
                        return;
                    }
                    data.hari = hariChecked.join(', ');
                }

                if (data.jam === 'CUSTOM') {
                    const masuk = document.getElementById('jamMasuk').value;
                    const keluar = document.getElementById('jamKeluar').value;
                    if (!masuk || !keluar) {
                        alert('Isi jam masuk dan jam keluar!');
                        return;
                    }
                    data.jam = `${masuk}-${keluar}`;
                }

                if (data.jam !== 'CUSTOM_SCHEDULE') {
                    jadwalFinal = `${data.hari} (${data.jam})`;
                    data.jadwal = jadwalFinal;
                }

                if ((data.jam || '').trim().toUpperCase() === 'CUSTOM_SCHEDULE') {
                    const jadwal = [];
                    document.querySelectorAll('.jadwal-row').forEach(row => {
                        const check = row.querySelector('.jadwal-check');
                        if (!check.checked) return;
                        const masuk = row.querySelector('.jam-masuk').value;
                        const keluar = row.querySelector('.jam-keluar').value;
                        if (!masuk || !keluar) return;
                        jadwal.push(`${check.value} (${masuk}-${keluar})`);
                    });

                    if (jadwal.length === 0) {
                        alert('Pilih minimal 1 jadwal!');
                        return;
                    }
                    jadwalFinal = jadwal.join(', ');
                    data.jadwal = jadwalFinal;
                    data.jam = jadwalFinal;
                }

                btn.disabled = true;
                btn.innerText = 'Memproses...';

                try {
                    await fetchWithAuth(`${API_URL}/api/kelas`, {
                        method: 'POST',
                        body: JSON.stringify({
                            program: data.program,
                            nama_kelas: data.kelas,
                            guru: data.guru,
                            jadwal: jadwalFinal
                        })
                    });

                    await fetchWithAuth(`${API_URL}/api/submit`, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });

                    document.getElementById('notif').classList.remove('hidden');
                    e.target.reset();

                    setTimeout(() => { location.reload(); }, 1500);

                } catch (err) {
                    console.log("Aksi simpan gagal:", err.message);
                    btn.disabled = false;
                    btn.innerText = 'Simpan Pendaftaran';
                }
            });
        });

        // PWA dan refreshAplikasi helper sudah diwarisi dari common.js
    </script>
</body>

</html>
