<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Bricolage+Grotesque:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-bricolage {
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        .details-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .details-content.open {
            max-height: 300px;
            opacity: 1;
            padding-top: 1rem;
            border-top: 1px dashed #e2e8f0;
            margin-top: 1rem;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-screen">
    <aside class="hidden md:flex flex-col w-64 h-full bg-white border-r border-slate-200 z-20 flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <div class="flex items-center gap-1">
                <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center overflow-hidden">
                    <img src="Logo Insan Jaya.jpeg" alt="Logo Insan Jaya" class="w-full h-full object-contain"
                        onerror="this.src='https://via.placeholder.com/150'" />
                </div>
                <span class="font-bricolage font-bold text-lg text-slate-900 tracking-tight">LKP</span>
                <span class="font-bricolage font-bold text-lg text-violet-600">INSAN JAYA</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar py-4 px-3 space-y-1">
            <a href="pendaftaran.html"
                class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                Pendaftaran Baru
            </a>
            <a href="absensi siswa.html"
                class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                Absensi Siswa
            </a>
            <a href="index.html"
                class="flex items-center gap-3 px-3 py-2.5 bg-violet-50 text-violet-700 rounded-xl font-semibold text-sm transition-colors">
                <svg class=" w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                Data Siswa Aktif
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-10">
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center overflow-hidden border">
                        <img src="Logo Insan Jaya.jpeg" class="w-full h-full object-contain">
                    </div>
                    <span class="font-bricolage font-bold text-base text-slate-900">LKP</span>
                    <span class="font-bricolage font-bold text-base text-violet-600">INSAN JAYA</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 pb-24 md:p-6 md:pb-6">

            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <h1 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Data Siswa
                        Aktif</h1>
                    <p class="text-sm text-slate-500 mt-1">Berikut adalah daftar siswa yang sedang aktif dalam program
                        les.</p>
                </div>

                <div class="flex gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 flex-1 shadow-sm">
                        <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider">Total Siswa
                        </p>
                        <p id="totalSiswa" class="text-2xl font-bricolage font-bold text-slate-800 mt-1">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 flex-1 shadow-sm">
                        <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider">Daftar Hari
                            Ini</p>
                        <p id="totalHariIni" class="text-2xl font-bricolage font-bold text-violet-600 mt-1">0</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4 mt-6">
                    <input id="searchNama" placeholder="Cari nama..."
                        class="col-span-2 md:col-span-1 px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">

                    <select id="filterProgram"
                        class="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-white">
                        <option value="">Semua Program</option>
                    </select>

                    <select id="filterKelas"
                        class="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-white">
                        <option value="">Semua Kelas</option>
                    </select>

                    <input id="filterGuru" placeholder="Cari guru..."
                        class="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">

                    <input id="filterJadwal" placeholder="Cari jadwal..."
                        class="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
                </div>

                <div class="hidden md:block bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                                <th class="p-4">Nama Siswa</th>
                                <th class="p-4">Program</th>
                                <th class="p-4">Kelas</th>
                                <th class="p-4">Guru</th>
                                <th class="p-4">Jadwal</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="desktopTbody" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <div id="mobileList" class="md:hidden space-y-3"></div>

            </div>
        </div>

        <nav
            class="md:hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center h-16 z-50 px-2 pb-safe">
            <a href="pendaftaran.html"
                class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-violet-600 transition-colors">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="text-[10px] font-semibold">Daftar</span>
            </a>
            <a href="absensi siswa.html"
                class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-violet-600 transition-colors">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                <span class="text-[10px] font-semibold">Absensi</span>
            </a>
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-violet-600">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <span class="text-[10px] font-semibold">Data Kelas</span>
            </a>
        </nav>

    </main>

    <script>
        let allData = [];
        const API = 'https://absensi-api.yumenoboken.workers.dev/api';

        async function loadData() {
            try {
                const res = await fetch(`${API}/data`);
                const data = await res.json();

                allData = data;

                document.getElementById('totalSiswa').innerText = data.length;

                const today = new Date().toLocaleDateString('en-CA');
                document.getElementById('totalHariIni').innerText =
                    data.filter(s => s.waktu_input.includes(today)).length;

                initFilterOptions(data);
                applyFilter();
            } catch (error) {
                console.error("Gagal memuat data", error);
            }
        }

        function renderDesktop(data) {
            const tbody = document.getElementById('desktopTbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-slate-400">Tidak ada data ditemukan</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold text-slate-800">${formatNama(s.nama_siswa)}</td>
                    <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs uppercase font-bold">${s.program}</span></td>
                    <td class="p-4 text-violet-700 font-bold">${s.kelas}</td>
                    <td class="p-4 text-slate-600 font-medium">${s.guru}</td>
                    <td class="p-4">
                        <span class="bg-amber-50 text-amber-600 border border-amber-100 px-2.5 py-1 rounded-md text-xs font-bold">
                        ${s.jadwal || '-'}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <button
                            onclick="toggleMenu(${s.id}, event)"
                            class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center mx-auto">
                            ⋮
                        </button>

                        <div
                            id="menu-${s.id}"
                            class="hidden fixed bg-white border border-slate-200 rounded-xl shadow-xl z-[9999] min-w-[150px]">

                            <button
                                onclick="editSiswa(${s.id})"
                                class="w-full text-left px-4 py-2 hover:bg-slate-50 text-slate-700">
                                ✏️ Edit
                            </button>

                            <button
                                onclick="hapus(${s.id})"
                                class="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600">
                                🗑️ Hapus
                            </button>

                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function toggleMenu(id, event) {

            document.querySelectorAll('[id^="menu-"]').forEach(menu => {

                if (menu.id !== `menu-${id}`) {
                    menu.classList.add('hidden');
                }

            });

            const menu =
                document.getElementById(`menu-${id}`);

            const rect =
                event.currentTarget.getBoundingClientRect();

            menu.style.top =
                `${rect.bottom + 5}px`;

            menu.style.left =
                `${rect.left - 110}px`;

            menu.classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {

            if (
                !e.target.closest('[onclick*="toggleMenu"]') &&
                !e.target.closest('[id^="menu-"]')
            ) {

                document
                    .querySelectorAll('[id^="menu-"]')
                    .forEach(menu =>
                        menu.classList.add('hidden')
                    );
            }
        });

        document.addEventListener('click', (e) => {

            if (!e.target.closest('[onclick^="toggleMenu"]') &&
                !e.target.closest('[id^="menu-"]')) {

                document
                    .querySelectorAll('[id^="menu-"]')
                    .forEach(menu => menu.classList.add('hidden'));
            }
        });

        function editSiswa(id) {

            const siswa =
                allData.find(s => s.id == id);

            if (!siswa) return;

            document.getElementById('editId').value =
                siswa.id;

            document.getElementById('editNama').value =
                siswa.nama_siswa || '';

            document.getElementById('editProgram').value =
                siswa.program || '';

            document.getElementById('editKelas').value =
                siswa.kelas || '';

            document.getElementById('editGuru').value =
                siswa.guru || '';

            document.getElementById('editJadwal').value =
                siswa.jadwal || '';

            document
                .getElementById('modalEdit')
                .classList
                .remove('hidden');
        }

        function tutupModalEdit() {

            document
                .getElementById('modalEdit')
                .classList
                .add('hidden');
        }

        async function simpanEdit() {

            const data = {

                id:
                    Number(
                        document.getElementById('editId').value
                    ),

                nama_siswa:
                    document.getElementById('editNama').value,

                program:
                    document.getElementById('editProgram').value,

                kelas:
                    document.getElementById('editKelas').value,

                guru:
                    document.getElementById('editGuru').value,

                jadwal:
                    document.getElementById('editJadwal').value
            };

            try {

                const res =
                    await fetch(
                        `${API}/edit`,
                        {
                            method: 'POST',
                            headers: {
                                'Content-Type':
                                    'application/json'
                            },
                            body:
                                JSON.stringify(data)
                        }
                    );

                if (!res.ok)
                    throw new Error();

                tutupModalEdit();

                loadData();

            } catch {

                alert(
                    'Gagal menyimpan perubahan'
                );
            }
        }

        function renderMobile(data) {
            const container = document.getElementById('mobileList');
            if (data.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-slate-400 bg-white rounded-2xl border border-slate-200">Tidak ada data ditemukan</div>`;
                return;
            }
            container.innerHTML = data.map((s, i) => {
                // Ambil 1 huruf pertama saja untuk inisial avatar
                const inisial = s.nama_siswa ? s.nama_siswa.charAt(0).toUpperCase() : '?';
                const namaFormat = formatNama(s.nama_siswa);

                return `
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center cursor-pointer gap-2" onclick="toggleDetails('det-${i}', 'icon-${i}')">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-10 h-10 flex-shrink-0 bg-violet-100 text-violet-700 rounded-full flex items-center justify-center font-bold text-lg">
                                ${inisial}
                            </div>
                            <div class="overflow-hidden">
                                <span class="font-bold text-slate-800 block truncate">${namaFormat}</span>
                                <span class="text-xs text-slate-500 font-medium block truncate">${s.kelas}</span>
                            </div>
                        </div>
                        <svg id="icon-${i}" class="w-5 h-5 text-slate-400 flex-shrink-0 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    <div id="det-${i}" class="details-content">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-2 rounded-lg"><p class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Program</p><p class="text-sm font-bold text-slate-700 capitalize">${s.program}</p></div>
                            <div class="bg-slate-50 p-2 rounded-lg"><p class="text-[10px] font-bold text-slate-400 uppercase mb-0.5">Guru</p><p class="text-sm font-bold text-slate-700">${s.guru}</p></div>
                            <div class="col-span-2 bg-amber-50 border border-amber-100 p-2 rounded-lg"><p class="text-[10px] font-bold text-amber-500 uppercase mb-0.5">Jadwal</p><p class="text-sm font-bold text-amber-700">${s.jadwal || '-'}</p></div>
                            <div class="col-span-2 mt-1 flex gap-2">
                                <button
                                    onclick="editSiswa(${s.id})"
                                    class="flex-1 flex justify-center items-center gap-2 text-slate-700 font-bold text-sm bg-slate-100 hover:bg-slate-200 py-2.5 rounded-xl transition-colors">
                                    ✏️ Edit
                                </button>
                                <button
                                    onclick="hapus(${s.id})"
                                    class="flex-1 flex justify-center items-center gap-2 text-red-600 font-bold text-sm bg-red-50 hover:bg-red-100 py-2.5 rounded-xl transition-colors">
                                    🗑️ Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function toggleDetails(id, iconId) {
            document.getElementById(id).classList.toggle('open');
            document.getElementById(iconId).classList.toggle('rotate-180');
        }

        function applyFilter() {
            const nama = document.getElementById('searchNama')?.value.toLowerCase() || '';
            const program = document.getElementById('filterProgram')?.value || '';
            const kelas = document.getElementById('filterKelas')?.value || '';
            const guru = document.getElementById('filterGuru')?.value.toLowerCase() || '';
            const jadwal = document.getElementById('filterJadwal')?.value.toLowerCase() || '';

            const filtered = allData.filter(s =>
                s.nama_siswa.toLowerCase().includes(nama) &&
                (program === '' || s.program === program) &&
                (kelas === '' || s.kelas === kelas) &&
                s.guru.toLowerCase().includes(guru) &&
                (s.jadwal || '').toLowerCase().includes(jadwal)
            );

            filtered.sort((a, b) =>
                a.nama_siswa.localeCompare(b.nama_siswa, 'id', { sensitivity: 'base' })
            );

            renderDesktop(filtered);
            renderMobile(filtered);
        }

        function initFilterOptions(data) {
            const programSet = [...new Set(data.map(d => d.program))]
                .sort((a, b) => a.localeCompare(b, 'id', { sensitivity: 'base' }));

            const kelasSet = [...new Set(data.map(d => d.kelas))]
                .sort((a, b) => a.localeCompare(b, 'id', { sensitivity: 'base' }));

            const progEl = document.getElementById('filterProgram');
            const kelasEl = document.getElementById('filterKelas');

            progEl.innerHTML = '<option value="">Semua Program</option>';
            kelasEl.innerHTML = '<option value="">Semua Kelas</option>';

            programSet.forEach(p => {
                progEl.innerHTML += `<option value="${p}">${p}</option>`;
            });

            kelasSet.forEach(k => {
                kelasEl.innerHTML += `<option value="${k}">${k}</option>`;
            });
        }

        function formatNama(nama) {
            return nama
                .toLowerCase()
                .replace(/\./g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .split(' ')
                .map(kata =>
                    kata.charAt(0).toUpperCase() + kata.slice(1)
                )
                .join(' ');
        }

        async function hapus(id) {
            if (!confirm("Hapus data?")) return;
            try {
                await fetch(`${API}/delete`, { method: 'POST', body: JSON.stringify({ id }) });
                loadData();
            } catch (error) {
                alert("Gagal menghapus data");
            }
        }

        ['searchNama', 'filterProgram', 'filterKelas', 'filterGuru', 'filterJadwal']
            .forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', applyFilter);
                    el.addEventListener('change', applyFilter);
                }
            });

        loadData();
    </script>
    <!-- MODAL EDIT SISWA -->
    <div id="modalEdit" class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-4">

        <div class="bg-white rounded-2xl w-full max-w-lg p-6">

            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-slate-800">
                    Edit Siswa
                </h2>

                <button onclick="tutupModalEdit()" class="text-slate-500 hover:text-slate-700 text-xl">
                    ✕
                </button>
            </div>

            <input type="hidden" id="editId">

            <div class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Nama Siswa
                    </label>

                    <input id="editNama" class="w-full border border-slate-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Program
                    </label>

                    <input id="editProgram" class="w-full border border-slate-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Kelas
                    </label>

                    <input id="editKelas" class="w-full border border-slate-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Guru
                    </label>

                    <input id="editGuru" class="w-full border border-slate-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Jadwal
                    </label>

                    <textarea id="editJadwal" rows="3"
                        class="w-full border border-slate-300 rounded-xl px-4 py-3"></textarea>
                </div>

            </div>

            <div class="flex justify-end gap-3 mt-6">

                <button onclick="tutupModalEdit()" class="px-4 py-2 rounded-xl bg-slate-100">
                    Batal
                </button>

                <button onclick="simpanEdit()" class="px-4 py-2 rounded-xl bg-violet-600 text-white">
                    Simpan
                </button>

            </div>

        </div>
    </div>
</body>

</html>
