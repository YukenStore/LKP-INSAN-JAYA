<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital Siswa</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        bricolage: ['"Bricolage Grotesque"', 'sans-serif'],
                    },
                    colors: {
                        neutral: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            800: '#262626',
                        },
                        violet: {
                            100: '#ede9fe',
                            500: '#8b5cf6', // Warna ungu fokus
                            600: '#7c3aed', // Warna ungu tombol hover
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-50 text-neutral-800 font-sans min-h-screen p-4 flex items-center justify-center">

    <main class="w-full max-w-[460px]">
        
        <div class="mb-6 text-center">
            <h1 class="font-bricolage text-2xl font-bold tracking-tight mb-1">Absensi Siswa</h1>
            <p class="text-xs text-neutral-400 font-medium">Lengkapi data kehadiran di bawah ini.</p>
        </div>

        <form id="formAbsensi" class="space-y-4">
            
            <div>
                <label for="nama_siswa" class="block text-xs font-semibold text-neutral-800 mb-1.5">Nama Lengkap</label>
                <input type="text" id="nama_siswa" name="nama_siswa" required 
                    class="w-full px-3 py-2 text-sm bg-transparent border border-neutral-300 rounded-lg focus:border-violet-500 focus:ring-1 focus:ring-violet-500 outline-none transition-colors placeholder-neutral-400" 
                    placeholder="Contoh: Andi Susanto">
            </div>

            <div>
                <label for="program" class="block text-xs font-semibold text-neutral-800 mb-1.5">Pilih Program</label>
                <div class="relative">
                    <select id="program" name="program" required 
                        class="w-full px-3 py-2 text-sm bg-transparent border border-neutral-300 rounded-lg appearance-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 outline-none transition-colors bg-white">
                        <option value="" disabled selected>Pilih salah satu program...</option>
                        <option value="calistung">Calistung</option>
                        <option value="bahasa inggris">Bahasa Inggris</option>
                        <option value="bahasa arab">Bahasa Arab</option>
                        <option value="bimbel">Bimbel</option>
                        <option value="komputer">Komputer</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="jam" class="block text-xs font-semibold text-neutral-800 mb-1.5">Pilih Jadwal Jam</label>
                <div class="relative">
                    <select id="jam" name="jam" required 
                        class="w-full px-3 py-2 text-sm bg-transparent border border-neutral-300 rounded-lg appearance-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 outline-none transition-colors bg-white">
                        <option value="" disabled selected>Pilih jadwal jam...</option>
                        <option value="07.30-09.00">07.30 - 09.00</option>
                        <option value="09.00-10.30">09.00 - 10.30</option>
                        <option value="10.30-12.00">10.30 - 12.00</option>
                        <option value="12.00-13.30">12.00 - 13.30</option>
                        <option value="13.30-15.00">13.30 - 15.00</option>
                        <option value="15.00-16.30">15.00 - 16.30</option>
                        <option value="16.30-18.00">16.30 - 18.00</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-neutral-800 mb-2">Pilih Hari (Wajib 3 Hari)</label>
                <div class="grid grid-cols-3 gap-2" id="hariContainer">
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Senin" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Senin</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Selasa" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Selasa</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Rabu" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Rabu</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Kamis" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Kamis</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Jumat" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Jumat</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2.5 bg-transparent border border-neutral-300 rounded-lg cursor-pointer hover:border-neutral-400 transition-colors">
                        <input type="checkbox" name="hari" value="Sabtu" class="form-checkbox h-4 w-4 text-violet-500 border-neutral-300 rounded focus:ring-violet-500 focus:ring-offset-0">
                        <span class="text-sm font-medium text-neutral-800">Sabtu</span>
                    </label>
                </div>
                <p id="errorHari" class="text-red-500 text-xs mt-2.5 hidden font-medium">⚠️ Anda harus memilih tepat 3 hari.</p>
            </div>

            <div class="pt-2">
                <button type="submit" id="btnSubmit" 
                    class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex justify-center items-center font-bricolage tracking-wide text-sm border border-transparent shadow-sm hover:shadow">
                    <span>Kirim Data Absensi</span>
                </button>
                <p id="pesanSukses" class="text-violet-600 text-xs font-bold text-center mt-4 hidden">✅ Data Anda berhasil disimpan.</p>
            </div>

        </form>
    </main>

    <script>
        // --- SCRIPT TAMBAHAN UNTUK EFEK VISUAL CHECKBOX ---
        const checkboxes = document.querySelectorAll('input[name="hari"]');
        checkboxes.forEach(box => {
            box.addEventListener('change', function() {
                const labelElement = this.closest('label');
                if (this.checked) {
                    labelElement.classList.remove('border-neutral-300');
                    labelElement.classList.add('border-violet-500', 'bg-violet-50/50');
                } else {
                    labelElement.classList.add('border-neutral-300');
                    labelElement.classList.remove('border-violet-500', 'bg-violet-50/50');
                }
            });
        });

        // --- SCRIPT LOGIKA PENGIRIMAN DATA ---
        document.getElementById('formAbsensi').addEventListener('submit', async function(e) {
            e.preventDefault();

            const form = e.target;
            const errorHari = document.getElementById('errorHari');
            const pesanSukses = document.getElementById('pesanSukses');
            const btnSubmit = document.getElementById('btnSubmit');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.hari = formData.getAll('hari');

            // Validasi HARUS TEPAT 3 HARI
            if (data.hari.length !== 3) {
                errorHari.classList.remove('hidden');
                return;
            } else {
                errorHari.classList.add('hidden');
            }

            const originalBtnText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = 'Mengirim...';
            btnSubmit.disabled = true;
            btnSubmit.classList.replace('bg-violet-600', 'bg-violet-400');
            btnSubmit.classList.replace('hover:bg-violet-700', 'hover:bg-violet-400');

            try {
                // Pastikan URL di bawah ini sama dengan URL Workermu
                const response = await fetch('https://absensi-api.yumenoboken.workers.dev/api/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    pesanSukses.classList.remove('hidden');
                    form.reset();
                    
                    checkboxes.forEach(box => {
                        const labelElement = box.closest('label');
                        labelElement.classList.add('border-neutral-300');
                        labelElement.classList.remove('border-violet-500', 'bg-violet-50/50');
                    });

                    setTimeout(() => {
                        pesanSukses.classList.add('hidden');
                    }, 4000);
                } else {
                    alert('Gagal menyimpan: ' + (result.error || 'Terjadi kesalahan'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal terhubung ke server. Periksa koneksi internet Anda.');
            } finally {
                btnSubmit.innerHTML = originalBtnText;
                btnSubmit.disabled = false;
                btnSubmit.classList.replace('bg-violet-400', 'bg-violet-600');
                btnSubmit.classList.replace('hover:bg-violet-400', 'hover:bg-violet-700');
            }
        });
    </script>
</body>
</html>
