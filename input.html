<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sistem Pendaftaran & Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-bricolage { font-family: 'Bricolage Grotesque', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden flex h-screen">

    <aside class="hidden md:flex flex-col w-64 h-full bg-white border-r border-slate-200 z-20 flex-shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl bg-violet-600 flex items-center justify-center text-white font-bricolage font-bold text-lg">A</div>
                <span class="font-bricolage font-bold text-lg text-slate-900 tracking-tight">Admin<span class="text-violet-600">Pro</span></span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto no-scrollbar py-4 px-3 space-y-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-violet-50 text-violet-700 rounded-xl font-semibold text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                Pendaftaran Baru
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                Absensi Siswa
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium text-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                Data Kelas
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center text-white font-bricolage font-bold">A</div>
                <span class="font-bricolage font-bold text-lg tracking-tight">Admin<span class="text-violet-600">Pro</span></span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
            <div class="max-w-2xl mx-auto">
                <div class="mb-8">
                    <h1 class="font-bricolage text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Pendaftaran Baru</h1>
                    <p class="text-sm text-slate-500 mt-1">Gunakan form ini untuk pendaftaran program les siswa.</p>
                </div>

                <div class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-slate-200/60">
                    <form id="formAbsensi" class="space-y-6">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Nama Lengkap Siswa</label>
                            <input type="text" name="nama_siswa" required placeholder="Nama lengkap siswa..." 
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-violet-500 outline-none transition-all">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Program</label>
                                <select id="program" name="program" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500 appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]">
                                    <option value="" disabled selected>Pilih program...</option>
                                    <option value="bahasa arab">Bahasa Arab</option>
                                    <option value="bahasa inggris">Bahasa Inggris</option>
                                    <option value="bimbel">Bimbel</option>
                                    <option value="calistung">Calistung</option>
                                    <option value="komputer">Komputer</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Kelas</label>
                                <select id="kelas" name="kelas" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-violet-500 appearance-none bg-no-repeat bg-[right_1rem_center] bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207L10%2012L15%207%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')]">
                                    <option value="" disabled selected>Pilih program dulu...</option>
                                </select>
                            </div>
                        </div>

                        <div id="infoKelasOtomatis" class="hidden animate-in fade-in slide-in-from-top-2 p-4 bg-violet-50 rounded-2xl border border-violet-100 flex flex-col md:flex-row gap-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center"><svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></div>
                                <div><p class="text-[10px] font-bold text-violet-400 uppercase">Guru</p><p id="displayGuru" class="text-sm font-semibold text-slate-800">-</p></div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center"><svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>
                                <div><p class="text-[10px] font-bold text-violet-400 uppercase">Jadwal</p><p id="displayJadwal" class="text-sm font-semibold text-slate-800">-</p></div>
                            </div>
                        </div>

                        <div id="areaKelasBaru" class="hidden p-5 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 block">Nama Kelas</label>
                                    <input type="text" id="new_nama_kelas" placeholder="Misal: Arab-1" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-violet-500 outline-none">
                                </div>
                                <div>
                                    <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 block">Guru Pengajar</label>
                                    <input type="text" id="new_guru" placeholder="Nama Guru..." class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-violet-500 outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 uppercase mb-1 block">Waktu Belajar</label>
                                <select id="new_jam" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-violet-500 outline-none">
                                    <option value="08.00-09.30">08.00 - 09.30</option>
                                    <option value="10.00-11.30">10.00 - 11.30</option>
                                    <option value="13.00-14.30">13.00 - 14.30</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-violet-100 active:scale-[0.98] font-bricolage tracking-wide">
                            Simpan Pendaftaran
                        </button>
                        <div id="notif" class="hidden text-center text-xs font-bold text-emerald-600 bg-emerald-50 py-3 rounded-xl border border-emerald-100">✅ Berhasil Terkirim!</div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-2 pb-safe z-20 shadow-lg">
        <a href="#" class="flex flex-col items-center p-2 text-violet-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span class="text-[10px] font-bold">Input</span>
        </a>
        <a href="#" class="flex flex-col items-center p-2 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
            <span class="text-[10px] font-bold">Absensi</span>
        </a>
    </nav>

    <script>
        const API_URL = 'https://absensi-api.yumenoboken.workers.dev';
        let listKelas = [];

        async function loadKelas() {
            try {
                const res = await fetch(`${API_URL}/api/kelas`);
                if (res.ok) listKelas = await res.json();
            } catch (e) { console.error("API error"); }
        }
        loadKelas();

        document.getElementById('program').addEventListener('change', (e) => {
            const prog = e.target.value;
            const kelasSelect = document.getElementById('kelas');
            const filtered = listKelas.filter(k => k.program === prog);
            
            kelasSelect.innerHTML = '<option value="" disabled selected>Pilih kelas...</option>';
            filtered.forEach(k => { kelasSelect.innerHTML += `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`; });
            kelasSelect.innerHTML += `<option value="__NEW__" class="text-violet-600 font-bold bg-violet-50">+ Tambah Kelas Baru</option>`;
            
            document.getElementById('areaKelasBaru').classList.add('hidden');
            document.getElementById('infoKelasOtomatis').classList.add('hidden');
        });

        document.getElementById('kelas').addEventListener('change', (e) => {
            const val = e.target.value;
            const areaInfo = document.getElementById('infoKelasOtomatis');
            const areaFormBaru = document.getElementById('areaKelasBaru');
            
            if (val === "__NEW__") {
                areaFormBaru.classList.remove('hidden');
                areaInfo.classList.add('hidden');
            } else {
                areaFormBaru.classList.add('hidden');
                const detail = listKelas.find(k => k.nama_kelas === val);
                if (detail) {
                    document.getElementById('displayGuru').innerText = detail.guru;
                    document.getElementById('displayJadwal').innerText = detail.jadwal;
                    areaInfo.classList.remove('hidden');
                }
            }
        });

        document.getElementById('formAbsensi').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const data = Object.fromEntries(new FormData(e.target).entries());

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                if (data.kelas === "__NEW__") {
                    const jam = document.getElementById('new_jam').value;
                    const namaK = document.getElementById('new_nama_kelas').value.trim();
                    const guruK = document.getElementById('new_guru').value.trim();

                    if(!namaK || !guruK) throw new Error("Nama Kelas & Guru wajib diisi!");

                    const payloadKelas = { program: data.program, nama_kelas: namaK, guru: guruK, jadwal: jam };
                    const resKelas = await fetch(`${API_URL}/api/kelas`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payloadKelas) });
                    
                    if (!resKelas.ok) throw new Error("Gagal simpan kelas");
                    data.kelas = payloadKelas.nama_kelas;
                    data.guru = payloadKelas.guru;
                } else {
                    const target = listKelas.find(k => k.nama_kelas === data.kelas);
                    data.guru = target ? target.guru : "-";
                }

                const resSiswa = await fetch(`${API_URL}/api/submit`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                if (resSiswa.ok) {
                    document.getElementById('notif').classList.remove('hidden');
                    e.target.reset();
                    setTimeout(() => location.reload(), 2000);
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "Simpan Pendaftaran";
            }
        });
    </script>
</body>
</html>
